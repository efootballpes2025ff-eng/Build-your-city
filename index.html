<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏙️ City Builder</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="app">
        <header class="resources-bar">
            <div class="logo">🏙️ City Builder</div>
            <div class="resources" id="resourcesContainer"></div>
            <div class="level-info">
                <span>المستوى: <strong id="levelDisplay">1</strong></span>
                <button id="saveBtn" class="btn-small">💾</button>
                <button id="resetBtn" class="btn-small btn-danger">🗑️</button>
            </div>
        </header>

        <main class="game-area">
            <aside class="buildings-store">
                <h3>🏗️ المتجر</h3>
                <div class="store-grid" id="storeGrid"></div>
            </aside>

            <section class="map-container">
                <div class="map-header">
                    <h3>🗺️ مدينتك</h3>
                    <span id="incomeDisplay" class="income-info">+0💰/ث</span>
                </div>
                <div class="grid-wrapper">
                    <div id="gameGrid" class="game-grid"></div>
                </div>
            </section>

            <aside class="info-panel">
                <h3>📊 المعلومات</h3>
                <div id="infoContent">
                    <p class="hint">اختر مبنى ثم اضغط على المربع للبناء</p>
                </div>
            </aside>
        </main>

        <div id="loading" class="loading-overlay">
            <div class="loading-spinner"></div>
            <p id="loadingText">جاري التحميل...</p>
        </div>

        <div id="error" class="error-overlay hidden">
            <h3>⚠️ حدث خطأ</h3>
            <p id="errorMessage"></p>
            <button class="btn" onclick="location.reload()">إعادة التحميل</button>
        </div>

        <div id="toast" class="toast"></div>
    </div>
    <script src="js/game.js"></script>
</body>
</html>
